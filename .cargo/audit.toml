# Advisory exceptions for `cargo audit`. Each ID is documented in SECURITY.md
# and deny.toml — none has an available upstream fix.
[advisories]
ignore = [
    "RUSTSEC-2023-0071", # rsa: timing sidechannel in private-key ops; server holds no RSA private key
    "RUSTSEC-2025-0141", # bincode 1.x unmaintained but stable; defines on-disk format
    "RUSTSEC-2025-0134", # rustls-pemfile unmaintained; transitive, superseded by rustls-pki-types
]

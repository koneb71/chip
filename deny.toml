# Configuration for cargo-deny (https://embarkstudios.github.io/cargo-deny/).
# Run: cargo deny check

[advisories]
# Fail on security vulnerabilities; surface unmaintained crates as warnings.
yanked = "deny"
unmaintained = "workspace"
ignore = [
    # RSA Marvin timing sidechannel. No upstream fix exists. Pulled in via the
    # SSH transport (russh "rsa" feature) for RSA *client* key support. The
    # server holds no RSA private key (host key is ed25519) and only verifies
    # signatures (a public-key op), so the private-key timing oracle this
    # describes is not reachable server-side. See SECURITY.md.
    "RUSTSEC-2023-0071",
    # bincode 1.x is unmaintained but stable; it defines our on-disk object
    # encoding, so a 2.x migration is a deliberate, format-affecting change
    # tracked separately, not a security fix.
    "RUSTSEC-2025-0141",
    # gix (gitoxide) does not detect SHA-1 collision attacks. Only reached by
    # `chip import git`, which reads a *local* repo the user already trusts and
    # uses with git — same exposure as git itself — and chip re-hashes all
    # content with BLAKE3. No fixed gix release exists. See SECURITY.md.
    "RUSTSEC-2025-0021",
    # gix-date TimeBuf::as_str can yield non-UTF8 — a date-formatting edge on the
    # same import-only path; no data-integrity impact. No fixed release.
    "RUSTSEC-2025-0140",
]

[licenses]
# Allow the common permissive licenses used across our dependency tree.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "OpenSSL",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
